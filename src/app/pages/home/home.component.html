<main class="home-container">
  <header class="hero">
    <h1 class="home-title">{{ headline() }}</h1>
    <div class="subtitle-wrapper">
      <p class="home-subtitle" aria-live="polite">
        @for (part of subheadlineParts(); track part; let i = $index) {
          <span class="subtitle-part part-{{ i }}">{{ part }}</span>
        }
      </p>
    </div>

    <div class="hero-actions">
      <a routerLink="/projects" class="btn-primary">
        {{ ctaPrimary() }}
      </a>
      <a routerLink="/about" class="btn-secondary">
        {{ ctaSecondary() }}
      </a>
    </div>
  </header>
</main>
