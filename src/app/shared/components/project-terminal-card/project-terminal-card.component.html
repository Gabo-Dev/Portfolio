<article
  class="project-card"
  [class]="project().terminalCardType"
  [attr.aria-labelledby]="'project-title-' + project().id"
>
  <div class="hardware-branding" aria-hidden="true">SYS-{{ project().id }}00</div>

  <div class="terminal-bezel">
    <header class="terminal-header">
      <div class="hardware-vents" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="terminal-buttons" aria-hidden="true">
        <span class="btn close"></span>
        <span class="btn minimize"></span>
        <span class="btn maximize"></span>
      </div>
      <h3 class="terminal-title" [id]="'project-title-' + project().id">
        bash - {{ project().title }}
      </h3>
    </header>

    <section class="terminal-screen" [attr.aria-label]="'Detalles del proyecto ' + project().title">
      <div class="boot-sequence" aria-hidden="true">
        <p class="sys-msg">Initializing nexus protocol...</p>
        <p class="sys-warn">[WARN] Unauthorized access detected</p>
        <p class="sys-msg">Bypassing security mainframe...</p>
      </div>

      <div class="real-content">
        <p class="prompt" aria-hidden="true">Iniciando {{ project().title }}...</p>
        <p class="desc">
          <span class="sr-only">Descripción técnica: </span>
          {{ project().terminalDescription }}
        </p>
        <p class="sys-status" aria-hidden="true">system.ready_ <span class="blink"></span></p>
      </div>

      <button
        class="execute-btn"
        (click)="onExecute()"
        [attr.aria-label]="'Ejecutar proyecto: ' + project().title"
      >
        EXECUTE
      </button>
    </section>
  </div>
</article>
